services:
  tracker-db:
    image: postgres:16-alpine
    container_name: tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - tracker-db-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  tracker-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tracker-backend
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_PORT:-3001}
      DB_HOST: tracker-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@tracker-db:5432/${DB_NAME}
      SCRAPING_TODAY_PRICE_URL: ${SCRAPING_TODAY_PRICE_URL}
      SCRAPING_LIVE_TRADING_URL: ${SCRAPING_LIVE_TRADING_URL}
      SCRAPING_PRICE_INTERVAL_MILLIS: ${SCRAPING_PRICE_INTERVAL_MILLIS}
      SCRAPING_INDEX_INTERVAL_MILLIS: ${SCRAPING_INDEX_INTERVAL_MILLIS}
    volumes:
      - tracker-backend-uploads:/app/uploads
    depends_on:
      tracker-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/watchlist',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  tracker-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
    container_name: tracker-frontend
    restart: unless-stopped
    depends_on:
      tracker-backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_PORT:-8087}:80"

volumes:
  tracker-db-data:
    name: tracker-db-data
  tracker-backend-uploads:
    name: tracker-backend-uploads
