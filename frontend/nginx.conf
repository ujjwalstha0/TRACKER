server {
  listen 80;
  server_name _;

  # Resolve Docker service names at runtime so backend-only redeploys do not cause stale upstream IPs.
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $api_upstream tracker-backend:3001;

  root /usr/share/nginx/html;
  index index.html;

  # Keep entry HTML fresh so it always references the newest hashed assets.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    try_files $uri =404;
  }

  # Serve built assets directly. Never fall back to index for missing CSS/JS.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri /index.html;
  }

  location /api/ {
    rewrite ^/api/?(.*)$ /$1 break;
    proxy_pass http://$api_upstream$uri$is_args$args;
    proxy_http_version 1.1;
    proxy_buffering off;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
